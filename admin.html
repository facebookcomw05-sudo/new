<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>لوحة المدير - استمارات المنحة</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .admin-nav { display: flex; justify-content: space-between; align-items: center; background: #020617; padding: 15px; border-radius: 14px; margin-bottom: 20px; }
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 20px; margin-top: 20px; }
    .grant-card { background: #0f172a; border: 1px solid #334155; border-radius: 16px; padding: 15px; cursor: pointer; transition: 0.2s; }
    .grant-card:hover { transform: translateY(-4px); border-color: #3b82f6; }
    .grant-card h3 { margin-bottom: 8px; color: #90cdf4; }
    .search-filters { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; align-items: center; }
    .search-filters input, .search-filters select { padding: 10px; background: #020617; border: 1px solid #475569; border-radius: 40px; color: white; }
    .pagination { display: flex; gap: 10px; justify-content: center; margin-top: 30px; }
    .logout-btn { background: #dc2626; color: white; border: none; padding: 8px 16px; border-radius: 40px; cursor: pointer; }
    .full-data-modal .modal-content { max-width: 700px; max-height: 80vh; overflow-y: auto; }
  </style>
</head>
<body>
  
  <div class="container" style="margin-top: 30px;">
    <div class="admin-nav"><h2>📋 استمارات المنحة (طلبات 100$)</h2><button id="logoutBtn" class="logout-btn">تسجيل خروج</button></div>
    <div id="authSection" style="text-align: center; padding: 50px;"><h2>تسجيل الدخول للمدير</h2><input type="email" id="adminEmail" placeholder="البريد الإلكتروني" style="display:block;margin:10px auto;padding:10px;"><input type="password" id="adminPassword" placeholder="كلمة السر" style="display:block;margin:10px auto;padding:10px;"><button id="loginBtn" class="btn-primary">دخول</button><div id="loginError" style="color:red;margin-top:10px;"></div></div>
    <div id="adminPanel" style="display:none;">
      <div class="search-filters"><input type="text" id="searchInput" placeholder="بحث في جميع الحقول..."><select id="filterProvince"><option value="">جميع المحافظات</option><option>دمشق</option><option>حلب</option><option>حمص</option>...</select><select id="sortBy"><option value="desc">الأحدث أولاً</option><option value="asc">الأقدم أولاً</option></select></div>
      <div id="stats" style="margin-bottom: 15px;">عدد الطلبات: <span id="totalCount">0</span></div>
      <div id="cardsContainer" class="card-grid"></div>
      <div id="pagination" class="pagination"></div>
    </div>
  </div>
  <!-- نافذة عرض التفاصيل الكاملة -->
  <div id="detailModal" class="modal hidden full-data-modal"><div class="modal-content"><h2>تفاصيل الاستمارة كاملة</h2><div id="fullDataContent"></div><div class="modal-actions"><button id="closeDetailBtn" class="btn-secondary">إغلاق</button></div></div></div>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="script.js"></script>
</body>
</html>
