<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تواصل معنا</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <header class="sub-hero"><h1>تواصل معنا</h1><p>يسعدنا استقبال رسائلكم واستفساراتكم.</p></header>
  <main class="container">
    <section class="card">
      <form id="contactForm">
        <div class="form-group"><label>الاسم:</label><input type="text" name="name" required></div>
        <div class="form-group"><label>البريد الإلكتروني:</label><input type="email" name="email" required></div>
        <div class="form-group"><label>رسالتك:</label><textarea name="message" rows="4" required></textarea></div>
        <button class="btn-primary" type="submit">إرسال</button>
      </form>
    </section>
  </main>
  <div id="successModal" class="modal hidden"><div class="modal-content"><h2>تم الإرسال</h2><p>شكراً لتواصلك معنا.</p><button id="successOk" class="btn-primary">حسناً</button></div></div>
  <footer class="footer"><p>© 2026 جمعية نعم لبناء الوطن</p></footer>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="script.js"></script>
</body>
</html>
